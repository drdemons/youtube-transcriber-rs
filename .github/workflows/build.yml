name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Linux (OpenMP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libfontconfig1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build --release -p yt-transcriber-cli --features yt-transcriber-core/openmp

      - name: Build GUI
        run: cargo build --release -p yt-transcriber-gui --features yt-transcriber-core/openmp

      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: yt-transcriber-linux-cli
          path: target/release/yt-transcriber

      - name: Upload GUI
        uses: actions/upload-artifact@v4
        with:
          name: yt-transcriber-linux-gui
          path: target/release/yt-transcriber-gui

  build-macos:
    name: macOS (Metal, .app bundle)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Install ffmpeg and dylibbundler
        run: brew install ffmpeg dylibbundler

      - name: Download yt-dlp
        run: |
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" -o yt-dlp
          chmod +x yt-dlp

      - name: Build CLI
        run: cargo build --release -p yt-transcriber-cli --features yt-transcriber-core/metal

      - name: Build .app bundle
        run: cargo bundle --release -p yt-transcriber-gui --features yt-transcriber-core/metal

      - name: Bundle ffmpeg and yt-dlp into .app
        run: |
          APP="target/release/bundle/osx/YouTube Transcriber.app"
          MACOS="$APP/Contents/MacOS"
          FRAMEWORKS="$APP/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS"

          # Copy yt-dlp (standalone binary)
          cp yt-dlp "$MACOS/yt-dlp"

          # Copy ffmpeg and bundle its dylibs
          cp "$(brew --prefix ffmpeg)/bin/ffmpeg" "$MACOS/ffmpeg"
          dylibbundler -od -b \
            -x "$MACOS/ffmpeg" \
            -d "$FRAMEWORKS/" \
            -p @executable_path/../Frameworks/

      - name: Create zip
        run: |
          cd target/release/bundle/osx
          zip -r yt-transcriber-macos.zip "YouTube Transcriber.app"

      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: yt-transcriber-macos-cli
          path: target/release/yt-transcriber

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: yt-transcriber-macos-app
          path: target/release/bundle/osx/yt-transcriber-macos.zip
